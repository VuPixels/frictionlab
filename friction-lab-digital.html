<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friction Lab Experience Audits by Vu</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --off-white: #f5f2ee;
    --warm-white: #faf8f5;
    --accent: #e85d2f;
    --accent-light: #f5896a;
    --muted: #888077;
    --border: #e0dbd3;
    --card-bg: #ffffff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--warm-white);
    color: var(--black);
    font-size: 17px;
    line-height: 1.65;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 3rem;
    background: rgba(250, 248, 245, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
    color: var(--black);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  nav a.cta-nav {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--black);
    text-decoration: none;
    border: 1.5px solid var(--black);
    padding: 0.5rem 1.25rem;
    border-radius: 100px;
    transition: all 0.2s ease;
  }

  nav a.cta-nav:hover {
    background: var(--black);
    color: var(--off-white);
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 3rem 5rem;
    position: relative;
    overflow: hidden;
  }

  .hero-eyebrow {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }

  .hero h1 {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 6.5vw, 6rem);
    line-height: 1.05;
    letter-spacing: -0.035em;
    max-width: 900px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.35s forwards;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 700;
  }

  .hero-sub {
    margin-top: 2rem;
    max-width: 560px;
    font-size: 1.1rem;
    color: #444;
    font-weight: 300;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
  }

  .hero-actions {
    margin-top: 2.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.65s forwards;
  }

  .btn-primary {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-weight: 500;
    font-size: 0.95rem;
    padding: 0.85rem 2rem;
    border-radius: 100px;
    text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(232, 93, 47, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(232, 93, 47, 0.4);
  }

  .btn-secondary {
    font-size: 0.9rem;
    color: var(--muted);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s;
  }

  .btn-secondary:hover { color: var(--black); }

  /* MARQUEE */
  .marquee-wrap {
    background: var(--black);
    color: var(--off-white);
    padding: 1rem 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .marquee-track {
    display: inline-flex;
    animation: marquee 22s linear infinite;
  }

  .marquee-track span {
    font-family: 'Manrope', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0 2.5rem;
  }

  .marquee-track span.dot {
    color: var(--accent);
    padding: 0;
  }

  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* SECTIONS */
  section { padding: 6rem 3rem; }

  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  h2 {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 4vw, 3.2rem);
    letter-spacing: -0.03em;
    line-height: 1.1;
    max-width: 700px;
    margin-bottom: 1.5rem;
  }
